<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — CADD Tech Solutions HRMS</title>
  <meta name="description" content="Sign in to CADD Tech Solutions Human Resource Management System with your Employee ID." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="login-styles.css" />
</head>
<body>

  <div class="login-page" id="login-page">
    <div class="login-card" id="login-card">

      <!-- Header / Branding -->
      <div class="login-header">
        <div class="login-logo">
          <img src="logo.jpg" alt="CADD Tech Solutions" />
          <div class="login-logo-text">
            <div class="company-name">CADD TECH</div>
            <div class="system-name">HRMS</div>
          </div>
        </div>
        <h1 class="login-title">Welcome back</h1>
        <p class="login-subtitle">Sign in with your Employee ID to continue</p>
      </div>

      <!-- Login Form -->
      <form class="login-form" id="login-form" autocomplete="off" novalidate>

        <!-- Error Banner -->
        <div class="login-error" id="login-error">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="login-error-text">Invalid Employee ID or password</span>
        </div>

        <!-- Employee ID -->
        <div class="login-field">
          <label for="empid-input">Employee ID</label>
          <div class="login-input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input
              type="text"
              id="empid-input"
              placeholder="e.g. 0001"
              autocomplete="username"
              spellcheck="false"
              autofocus
            />
          </div>
        </div>

        <!-- Password -->
        <div class="login-field">
          <label for="password-input">Password</label>
          <div class="login-input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              type="password"
              id="password-input"
              placeholder="Enter your password"
              autocomplete="current-password"
            />
            <button type="button" class="password-toggle" id="password-toggle" aria-label="Toggle password visibility">
              <!-- Eye icon (show) -->
              <svg id="eye-icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- Eye-off icon (hide) — hidden by default -->
              <svg id="eye-icon-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Options Row -->
        <div class="login-options">
          <label class="remember-me">
            <input type="checkbox" id="remember-me" />
            Remember me
          </label>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="login-btn" id="login-btn">
          <span id="login-btn-text">Sign In</span>
          <div class="login-spinner" id="login-spinner" style="display:none"></div>
        </button>

      </form>

      <!-- Footer -->
      <div class="login-divider"></div>
      <div class="login-footer">
        <p>
          CADD Tech Solutions · Human Resource Management<br />
          <a href="https://www.instagram.com/caddtechsolutions/" target="_blank" rel="noopener">@caddtechsolutions</a>
        </p>
      </div>

    </div>
  </div>

  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- Auth Modules -->
  <script src="js/supabase.js?v=5"></script>
  <script src="js/session.js?v=9"></script>
  <script src="js/auth.js?v=7"></script>

  <!-- Login Page Logic -->
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Auto-redirect disabled so user can manually test login forms.

      // DOM Elements
      const form = document.getElementById('login-form');
      const empidInput = document.getElementById('empid-input');
      const passwordInput = document.getElementById('password-input');
      const loginBtn = document.getElementById('login-btn');
      const loginBtnText = document.getElementById('login-btn-text');
      const loginSpinner = document.getElementById('login-spinner');
      const errorEl = document.getElementById('login-error');
      const errorText = document.getElementById('login-error-text');
      const passwordToggle = document.getElementById('password-toggle');
      const eyeShow = document.getElementById('eye-icon-show');
      const eyeHide = document.getElementById('eye-icon-hide');

      // Show/Hide Password Toggle
      passwordToggle.addEventListener('click', () => {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        eyeShow.style.display = isPassword ? 'none' : 'block';
        eyeHide.style.display = isPassword ? 'block' : 'none';
        passwordInput.focus();
      });

      // Hide error when user starts typing
      empidInput.addEventListener('input', () => hideError());
      passwordInput.addEventListener('input', () => hideError());

      // Form Submit
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        await handleLogin();
      });

      // Login handler
      async function handleLogin() {
        const empid = empidInput.value.trim();
        const password = passwordInput.value;

        // Clear previous error
        hideError();

        // Set loading state
        setLoading(true);

        try {
          const { user, profile } = await Auth.login(empid, password);

          // Success — redirect based on role
          const dashboardUrl = Session.getDashboardUrl(profile.role);
          window.location.href = dashboardUrl;

        } catch (err) {
          showError(err.message);
          setLoading(false);
          // Focus the relevant field
          if (err.message.includes('Employee ID')) {
            empidInput.focus();
          } else {
            passwordInput.focus();
            passwordInput.select();
          }
        }
      }

      function setLoading(loading) {
        loginBtn.disabled = loading;
        loginBtnText.style.display = loading ? 'none' : 'inline';
        loginSpinner.style.display = loading ? 'block' : 'none';
        empidInput.disabled = loading;
        passwordInput.disabled = loading;
      }

      function showError(message) {
        errorText.textContent = message;
        errorEl.classList.add('visible');
        // Re-trigger shake animation
        errorEl.style.animation = 'none';
        errorEl.offsetHeight; // reflow
        errorEl.style.animation = '';
      }

      function hideError() {
        errorEl.classList.remove('visible');
      }
    });
  </script>

</body>
</html>
