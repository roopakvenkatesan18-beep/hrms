<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password — CADD Tech Solutions HRMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="login-styles.css" />
</head>
<body>

  <div class="login-page" id="change-page">
    <div class="login-card" id="change-card">

      <!-- Header / Branding -->
      <div class="login-header">
        <div class="login-logo">
          <img src="logo.jpg" alt="CADD Tech Solutions" />
          <div class="login-logo-text">
            <div class="company-name">CADD TECH</div>
            <div class="system-name">HRMS</div>
          </div>
        </div>
        <h1 class="login-title">Change Password</h1>
        <p class="login-subtitle">Verify your identity, then set a new password</p>
      </div>

      <!-- Change Password Form -->
      <form class="login-form" id="change-form" autocomplete="off" novalidate>

        <!-- Error Banner -->
        <div class="login-error" id="change-error">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="change-error-text">Something went wrong</span>
        </div>

        <!-- Employee ID -->
        <div class="login-field">
          <label for="cp-empid">Employee ID</label>
          <div class="login-input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input type="text" id="cp-empid" placeholder="e.g. 0001" autocomplete="username" spellcheck="false" autofocus />
          </div>
        </div>

        <!-- Current Password -->
        <div class="login-field">
          <label for="cp-current">Current Password</label>
          <div class="login-input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input type="password" id="cp-current" placeholder="Enter current password" autocomplete="current-password" />
            <button type="button" class="password-toggle" data-target="cp-current" aria-label="Toggle password visibility">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <!-- New Password -->
        <div class="login-field">
          <label for="cp-new">New Password</label>
          <div class="login-input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input type="password" id="cp-new" placeholder="Min. 8 characters" autocomplete="new-password" />
            <button type="button" class="password-toggle" data-target="cp-new" aria-label="Toggle password visibility">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="login-field">
          <label for="cp-confirm">Confirm New Password</label>
          <div class="login-input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input type="password" id="cp-confirm" placeholder="Re-enter new password" autocomplete="new-password" />
            <button type="button" class="password-toggle" data-target="cp-confirm" aria-label="Toggle password visibility">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="login-btn" id="change-btn">
          <span id="change-btn-text">Update Password</span>
          <div class="login-spinner" id="change-spinner" style="display:none"></div>
        </button>

        <a href="login.html" class="login-link" id="back-to-login">← Back to sign in</a>

      </form>

    </div>
  </div>

  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- Auth Modules -->
  <script src="js/supabase.js?v=5"></script>
  <script src="js/session.js?v=9"></script>
  <script src="js/auth.js?v=7"></script>

  <!-- Change Password Logic -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('change-form');
      const empidInput = document.getElementById('cp-empid');
      const currentInput = document.getElementById('cp-current');
      const newInput = document.getElementById('cp-new');
      const confirmInput = document.getElementById('cp-confirm');
      const btn = document.getElementById('change-btn');
      const btnText = document.getElementById('change-btn-text');
      const spinner = document.getElementById('change-spinner');
      const errorEl = document.getElementById('change-error');
      const errorText = document.getElementById('change-error-text');

      // Toggle password visibility
      document.querySelectorAll('.password-toggle').forEach(toggle => {
        toggle.addEventListener('click', () => {
          const target = document.getElementById(toggle.dataset.target);
          if (!target) return;
          const isHidden = target.type === 'password';
          target.type = isHidden ? 'text' : 'password';
          target.focus();
        });
      });

      [empidInput, currentInput, newInput, confirmInput].forEach(el =>
        el.addEventListener('input', hideError()));

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        await handleChange();
      });

      async function handleChange() {
        const empid = empidInput.value.trim();
        const current = currentInput.value;
        const newPass = newInput.value;
        const confirm = confirmInput.value;

        hideError();

        if (!empid || !current || !newPass || !confirm) {
          return showError('Please fill in all fields.');
        }
        if (newPass.length < 8) {
          return showError('New password must be at least 8 characters.');
        }
        if (newPass !== confirm) {
          return showError('New password and confirmation do not match.');
        }

        setLoading(true);
        try {
          const email = `${empid}@caddtech.com`;

          // 1. Validate the current password by signing in
          const { error: signInError } = await supabaseClient.auth.signInWithPassword({
            email,
            password: current
          });
          if (signInError) {
            throw new Error('Current password is incorrect.');
          }

          // 2. Securely update the password (hashed server-side by Supabase)
          const { error: updErr } = await supabaseClient.auth.updateUser({ password: newPass });
          if (updErr) {
            throw new Error(updErr.message || 'Could not update password.');
          }

          // 3. Sign out and return to login
          await supabaseClient.auth.signOut();
          window.location.href = 'login.html?changed=1';
        } catch (err) {
          showError(err.message || 'Could not change password.');
          setLoading(false);
        }
      }

      function setLoading(loading) {
        btn.disabled = loading;
        btnText.style.display = loading ? 'none' : 'inline';
        spinner.style.display = loading ? 'block' : 'none';
        [empidInput, currentInput, newInput, confirmInput].forEach(el => el.disabled = loading);
      }

      function showError(message) {
        errorText.textContent = message;
        errorEl.classList.add('visible');
        errorEl.style.animation = 'none';
        errorEl.offsetHeight;
        errorEl.style.animation = '';
      }

      function hideError() {
        errorEl.classList.remove('visible');
      }
    });
  </script>

</body>
</html>
