<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unauthorized — CADD Tech Solutions HRMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      background: var(--background);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: var(--font-sans);
    }
    .unauth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 3rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    @media (max-width: 480px) {
      .unauth-card { padding: 2rem 1.5rem; margin: 1rem; }
      .unauth-icon { width: 48px; height: 48px; }
      .unauth-title { font-size: 1.25rem; }
      .unauth-desc { font-size: 0.875rem; }
    }
    .unauth-icon {
      width: 64px;
      height: 64px;
      color: var(--destructive);
      margin: 0 auto 1.5rem;
    }
    .unauth-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--foreground);
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    .unauth-desc {
      color: var(--muted-foreground);
      font-size: 0.9375rem;
      line-height: 1.5;
      margin-bottom: 2rem;
    }
    .unauth-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1.5rem;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      font-size: 0.9375rem;
      border: none;
      border-radius: var(--radius);
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
    }
    .unauth-btn:hover {
      background: #b91c1c; /* Slightly darker red */
    }
  </style>
</head>
<body>

  <div class="unauth-card">
    <svg class="unauth-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
      <path d="M7 11V7a5 5 0 0 1 10 0v4" />
    </svg>
    <h1 class="unauth-title">Access Denied</h1>
    <p class="unauth-desc">You don't have permission to view this page. If you believe this is an error, please contact your administrator.</p>
    <button id="return-btn" class="unauth-btn">Return to Dashboard</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/session.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const returnBtn = document.getElementById('return-btn');
      
      returnBtn.addEventListener('click', async () => {
        // Try to get profile to route them correctly
        const profile = await Session.getProfile();
        
        if (profile) {
          window.location.href = Session.getDashboardUrl(profile.role);
        } else {
          // Fallback to login
          window.location.href = 'login.html';
        }
      });
    });
  </script>

</body>
</html>
